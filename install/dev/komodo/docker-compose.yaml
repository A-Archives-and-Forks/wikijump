services:
  postgres:
    # Pin to a specific version. Updates can be breaking.
    # https://github.com/FerretDB/documentdb/pkgs/container/postgres-documentdb
    image: ghcr.io/ferretdb/postgres-documentdb:17
    restart: unless-stopped
    labels:
      # Prevent Komodo from stopping with StopAllContainers
      komodo.skip:
    volumes:
      - ferretdb-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KOMODO_DB_USERNAME}
      POSTGRES_PASSWORD: ${KOMODO_DB_PASSWORD}
      POSTGRES_DB: postgres

  ferretdb:
    # Likewise here, pin a version.
    # https://github.com/FerretDB/FerretDB/pkgs/container/ferretdb
    image: ghcr.io/ferretdb/ferretdb:2.5
    restart: unless-stopped
    labels:
      komodo.skip:
    depends_on:
      - postgres
    links:
      - postgres
    volumes:
      - ferretdb-state:/state
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://${KOMODO_DB_USERNAME}:${KOMODO_DB_PASSWORD}@postgres:5432/postgres

  core:
    image: ghcr.io/moghtech/komodo-core:latest
    restart: unless-stopped
    labels:
      komodo.skip:
    depends_on:
      - ferretdb
    links:
      - ferretdb
    ports:
      - 9120:9120
    env_file: ./compose.env
    environment:
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
    volumes:
      ## Store dated backups of the database - https://komo.do/docs/setup/backup
      - /var/lib/komodo/backups:/backups
      ## Store sync files on server
      # - /your/path/to/syncs:/syncs
      ## Optionally mount a custom core.config.toml
      # - /your/path/to/core.config.toml:/config/config.toml
    ## Allows for systemd Periphery connection at "https://host.docker.internal:8120"
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  ferretdb-postgres:
  ferretdb-state:
