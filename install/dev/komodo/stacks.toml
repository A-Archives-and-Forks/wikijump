[[stack]]
name = "wikijump-dev"
tags = ["wikijump"]
[stack.config]
server = "Local"
project_name = "wikijump"
run_build = true
destroy_before_deploy = true
linked_repo = "wikijump-dev"
run_directory = "install/dev"
file_paths = ["docker-compose.yaml"]
# Set to the container registry where your images are kept
registry_provider = "575596218155.dkr.ecr.us-east-2.amazonaws.com"
registry_account = "AWS"
# Pass-through variables/secrets defined in variables.toml
environment = """
POSTGRES_PASSWORD=[[POSTGRES_PASSWORD]]
S3_FILES_BUCKET=[[S3_FILES_BUCKET]]
S3_TEXT_BLOCKS_BUCKET=[[S3_TEXT_BLOCKS_BUCKET]]
S3_CUSTOM_ENDPOINT=[[S3_CUSTOM_ENDPOINT]]
S3_REGION_NAME=[[S3_REGION_NAME]]
S3_PATH_STYLE=[[S3_PATH_STYLE]]
S3_ACCESS_KEY_ID=[[S3_ACCESS_KEY_ID]]
S3_SECRET_ACCESS_KEY=[[S3_SECRET_ACCESS_KEY]]
"""
