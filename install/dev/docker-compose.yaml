services:
  database:
    build:
      context: ../..
      dockerfile: install/dev/postgres/Dockerfile
    environment:
      - "POSTGRES_DB=wikijump"
      - "POSTGRES_USER=wikijump"
      - "POSTGRES_PASSWORD=wikijump"
      - "POSTGRES_HOST_AUTH_METHOD=md5"
      - "POSTGRES_INITDB_ARGS=--locale en_US.UTF-8"
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 10s
      timeout: 5s
      retries: 6

  cache:
    build: valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    # You can add a volume for /data if you wish
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  deepwell:
    image: 575596218155.dkr.ecr.us-east-2.amazonaws.com/wikijump/deepwell:dev
    ports:
      - "2747:2747"
    networks:
      - dokploy-network
    environment:
      - "DATABASE_URL=${DATABASE_URL}"
      - "REDIS_URL=${REDIS_URL}"
      - "S3_FILES_BUCKET=${S3_FILES_BUCKET}"
      - "S3_TEXT_BLOCKS_BUCKET=${S3_TEXT_BLOCKS_BUCKET}"
      - "S3_REGION_NAME=${S3_REGION_NAME}"
      - "S3_CUSTOM_ENDPOINT=${S3_CUSTOM_ENDPOINT}"
      - "S3_PATH_STYLE=${S3_PATH_STYLE}"
      - "S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}"
      - "S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 120s
      timeout: 2s
      retries: 3
      start_period: 600s
      start_interval: 10s

  framerail:
    image: 575596218155.dkr.ecr.us-east-2.amazonaws.com/wikijump/framerail:dev
    ports:
      - "3393:3393"
    links:
      - deepwell
    environment:
      - "DEEPWELL_HOST=deepwell"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 120s
      timeout: 2s
      retries: 3
    depends_on:
      deepwell:
        condition: service_healthy

  wws:
    image: 575596218155.dkr.ecr.us-east-2.amazonaws.com/wikijump/wws:dev
    ports:
      - "3466:3466"
    networks:
      - dokploy-network
    links:
      - deepwell
    environment:
      - "ADDRESS=[::]:3466"
      - "DEEPWELL_URL=http://deepwell:2747"
      - "REDIS_URL=${REDIS_URL}"
      - "S3_FILES_BUCKET=${S3_FILES_BUCKET}"
      - "S3_TEXT_BLOCKS_BUCKET=${S3_TEXT_BLOCKS_BUCKET}"
      - "S3_REGION_NAME=${S3_REGION_NAME}"
      - "S3_CUSTOM_ENDPOINT=${S3_CUSTOM_ENDPOINT}"
      - "S3_PATH_STYLE=${S3_PATH_STYLE}"
      - "S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}"
      - "S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 120s
      timeout: 2s
      retries: 3
    depends_on:
      deepwell:
        condition: service_healthy

  caddy:
    image: 575596218155.dkr.ecr.us-east-2.amazonaws.com/wikijump/caddy:dev
    links:
      - framerail
      - wws
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 30s
      timeout: 2s
      retries: 3
    depends_on:
      deepwell:
        condition: service_healthy
