services:
  deepwell:
    image: ghcr.io/scpwiki/wikijump:deepwell-dev
    ports:
      - "2747:2747"
    networks:
      - dokploy-network
    environment:
      - "DATABASE_URL=${DATABASE_URL}"
      - "REDIS_URL=${REDIS_URL}"
      - "S3_FILES_BUCKET=${S3_FILES_BUCKET}"
      - "S3_TEXT_BLOCKS_BUCKET=${S3_TEXT_BLOCKS_BUCKET}"
      - "S3_REGION_NAME=${S3_REGION_NAME}"
      - "S3_CUSTOM_ENDPOINT=${S3_CUSTOM_ENDPOINT}"
      - "S3_PATH_STYLE=${S3_PATH_STYLE}"
      - "S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}"
      - "S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}"
    restart: always
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 120s
      timeout: 2s
      retries: 3
      start_period: 600s
      start_interval: 10s

  framerail:
    image: ghcr.io/scpwiki/wikijump:framerail-dev
    ports:
      - "3393:3393"
    links:
      - deepwell
    environment:
      - "DEEPWELL_HOST=deepwell"
    restart: always
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 120s
      timeout: 2s
      retries: 3
    depends_on:
      deepwell:
        condition: service_healthy

  wws:
    image: ghcr.io/scpwiki/wikijump:wws-dev
    ports:
      - "7000:7000"
    networks:
      - dokploy-network
    links:
      - deepwell
    environment:
      - "ADDRESS=[::]:7000"
      - "DEEPWELL_URL=http://deepwell:2747"
      - "REDIS_URL=${REDIS_URL}"
      - "S3_FILES_BUCKET=${S3_FILES_BUCKET}"
      - "S3_TEXT_BLOCKS_BUCKET=${S3_TEXT_BLOCKS_BUCKET}"
      - "S3_REGION_NAME=${S3_REGION_NAME}"
      - "S3_CUSTOM_ENDPOINT=${S3_CUSTOM_ENDPOINT}"
      - "S3_PATH_STYLE=${S3_PATH_STYLE}"
      - "S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}"
      - "S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}"
    restart: always
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 120s
      timeout: 2s
      retries: 3
    depends_on:
      deepwell:
        condition: service_healthy

  caddy:
    image: ghcr.io/scpwiki/wikijump:caddy-dev
    links:
      - framerail
      - wws
    restart: always
    healthcheck:
      test: ["CMD", "wikijump-health-check"]
      interval: 30s
      timeout: 2s
      retries: 3
    depends_on:
      deepwell:
        condition: service_healthy
