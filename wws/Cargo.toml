[package]
name = "wws"
description = "Wilson's Web Server - Serve a zoo of user content (files, code, etc)"
repository = "https://github.com/scpwiki/wikijump/tree/develop/wws"
readme = "README.md"
license = "AGPL-3.0-or-later"
keywords = ["wikijump", "api", "backend", "wiki"]
categories = ["asynchronous", "caching", "web-programming::http-server"]
exclude = [".gitignore"]

version = "2025.1.1"
authors = ["Emmie Smith <emmie.maeda@gmail.com>"]
edition = "2021"

[dependencies]
anyhow = "1"
axum = { version = "0.8", features = [ "http1", "http2", "macros", "tokio", "tower-log", "tracing" ], default-features = false }
axum-extra = { version = "0.10", features = [ "attachment" ] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
