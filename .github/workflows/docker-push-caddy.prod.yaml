name: '[backend] Docker push Caddy (PROD)'

on:
  push:
    branches:
      - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: scpwiki/wikijump
  DESCRIPTION: Caddy server configured for Wikijump
  NAME: caddy
  TIER: prod

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: metadata
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # use "prod" for latest production branch pushes
            type=raw,value=${{ env.NAME }}-${{ env.TIER }},enable=${{ github.ref == format('refs/heads/{0}', 'prod') }}
          labels: |
            org.opencontainers.image.title=${{ env.NAME }}
            org.opencontainers.image.description=${{ env.DESCRIPTION }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          file: install/${{ env.TIER }}/${{ env.NAME }}/Dockerfile
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
