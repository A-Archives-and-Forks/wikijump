name: '[deepwell] Rust'

on:
  pull_request:
    paths:
      - 'deepwell/Cargo.toml'
      - 'deepwell/Cargo.lock'
      - 'deepwell/src/**'
      - '.github/workflows/deepwell.yaml'
      - '.github/codecov.yml'
      - 'deepwell/config.example.toml'
      - 'install/local/api/deepwell.toml'
      - 'install/dev/api/deepwell.toml'
      - 'install/prod/api/deepwell.toml'
  push:
    branches:
      - develop
      - prod

jobs:
  binary_build_and_test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:alpine
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        env:
          MINIO_API_PORT_NUMBER: '9000'
          MINIO_SERVER_ACCESS_KEY: 's3-access-key'
          MINIO_SERVER_SECRET_KEY: 's3-secret-key'
          MINIO_REGION_NAME: 'local'
          INITIAL_BUCKETS: 'deepwell-files deepwell-text-blocks'
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/9000'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RUSTFLAGS: -D warnings
      DATABASE_URL: postgres://postgres:postgres@postgres/postgres
      REDIS_URL: redis://valkey
      S3_CUSTOM_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: 's3-access-key'
      S3_SECRET_ACCESS_KEY: 's3-secret-key'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cargo Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            deepwell/target
          key: ${{ runner.os }}-deepwell-default-${{ hashFiles('deepwell/**/Cargo.toml') }}

      - name: System Dependencies
        run: sudo apt update && sudo apt install libmagic-dev

      - name: Build (no features)
        run: cd deepwell && cargo build --no-default-features

      - name: Build (all features)
        run: cd deepwell && cargo build --all-features

      - name: Check Configuration
        run: cd deepwell && cargo run -- config.example.toml ../install/local/deepwell/config.toml ../install/dev/deepwell/config.toml ../install/prod/deepwell/config.toml
        env:
          DEEPWELL_RUNTIME_ACTION: validate-config

      - name: Run Seeder
        run: cd deepwell && cargo run -- config.example.toml
        env:
          DEEPWELL_RUNTIME_ACTION: run-seeder

      - name: Test
        run: cd deepwell && cargo test --all-features -- --nocapture --test-threads 1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cargo Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            deepwell/target
          key: ${{ runner.os }}-deepwell-coverage-${{ hashFiles('deepwell/**/Cargo.toml') }}

      - name: System Dependencies
        run: apt update && apt install libmagic-dev

      - name: Generate Coverage
        run: |
          cd deepwell && cargo +nightly tarpaulin --verbose --all-features --workspace --timeout 120 --out xml

      - name: Export Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: deepwell/target/coverage/cobertura.xml
          fail_ci_if_error: true
          verbose: true

  clippy_lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cargo Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            deepwell/target
          key: ${{ runner.os }}-deepwell-lint-${{ hashFiles('deepwell/**/Cargo.toml') }}

      - name: System Dependencies
        run: sudo apt update && sudo apt install libmagic-dev

      - name: Machete
        uses: bnjbvr/cargo-machete@main
        with:
          args: 'deepwell'

      - name: Rustfmt
        run: cd deepwell && cargo fmt --all -- --check

      - name: Clippy
        run: cd deepwell && cargo clippy --tests --no-deps
